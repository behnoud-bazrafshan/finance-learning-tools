<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Frequency Distribution</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background: var(--card);
            width: 100%;
            max-width: 920px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
        }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .content {
            padding: 28px;
        }

        .status {
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 22px;
            color: var(--accent);
        }

        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 400px;
            border-bottom: 2px solid var(--text);
            border-left: 2px solid var(--text);
            padding-bottom: 5px;
            width: 100%;
            position: relative;
        }

        .y-axis {
            position: absolute;
            left: -30px;
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .bin-column {
            flex: 1;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            height: 100%;
            margin: 0 1px;
            position: relative;
        }

        .data-block {
            width: 100%;
            height: 0;
            background-color: #93c5fd;
            border: 1px solid var(--accent);
            box-sizing: border-box;
            transition: height 0.3s ease-in-out, background-color 0.3s;
        }

        .data-block.highlight {
            background-color: var(--orange);
        }

        .x-axis-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.75rem;
            left: -10px;
            transform: translateX(-50%);
            color: var(--text-muted);
        }

        .x-axis-title {
            margin-top: 32px;
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--text);
            text-align: center;
        }

        .y-axis-title {
            position: absolute;
            left: -70px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--text);
        }

        .chart-area {
            position: relative;
            padding-left: 90px;
        }

        .controls {
            background: var(--bg);
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a class="back-link" href="./index.html">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;"><path d="M10 3L5 8l5 5"/></svg>
                Finance Learning Tools
            </a>
            <h1>Frequency Distribution of Returns on Canadian Common Stocks</h1>
            <div class="subtitle">Annual Returns (1948 – 2022)</div>
        </div>

        <div class="content">
            <div class="status" id="status-text">Click 'Step Forward' to begin.</div>

            <div class="chart-area">
                <div class="y-axis-title">Number of years</div>
                <div class="chart-container" id="chart">
                    <div class="y-axis" id="y-axis-labels"></div>
                </div>
                <div class="x-axis-title">Return (%)</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-step" onclick="step()">Step Forward</button>
            <button class="btn btn-secondary" id="btn-play" onclick="playAll()">Play All</button>
            <button class="btn btn-outline" id="btn-final" onclick="showFinal()">Show Final</button>
            <button class="btn btn-outline" id="btn-reset" onclick="reset()">Reset</button>
        </div>
    </div>

<script>
    // Data extracted from the provided tables
    const returnsData = [
        {year: 1948, return: 12.25}, {year: 1949, return: 23.85}, {year: 1950, return: 51.69}, {year: 1951, return: 25.44},
        {year: 1952, return: 0.01}, {year: 1953, return: 2.56}, {year: 1954, return: 39.37}, {year: 1955, return: 27.68},
        {year: 1956, return: 12.68}, {year: 1957, return: -20.58}, {year: 1958, return: 31.25}, {year: 1959, return: 4.59},
        {year: 1960, return: 1.78}, {year: 1961, return: 32.75}, {year: 1962, return: -7.09}, {year: 1963, return: 15.60},
        {year: 1964, return: 25.43}, {year: 1965, return: 6.67}, {year: 1966, return: -7.07}, {year: 1967, return: 18.09},
        {year: 1968, return: 22.45}, {year: 1969, return: -0.81}, {year: 1970, return: -3.57}, {year: 1971, return: 8.01},
        {year: 1972, return: 27.37}, {year: 1973, return: 0.27}, {year: 1974, return: -25.93}, {year: 1975, return: 18.48},
        {year: 1976, return: 11.02}, {year: 1977, return: 10.71}, {year: 1978, return: 29.72}, {year: 1979, return: 44.77},
        {year: 1980, return: 30.13}, {year: 1981, return: -10.25}, {year: 1982, return: 5.54}, {year: 1983, return: 35.49},
        {year: 1984, return: -2.39}, {year: 1985, return: 25.07}, {year: 1986, return: 8.95}, {year: 1987, return: 5.88},
        {year: 1988, return: 11.08}, {year: 1989, return: 21.37}, {year: 1990, return: -14.80}, {year: 1991, return: 12.02},
        {year: 1992, return: -1.43}, {year: 1993, return: 32.55}, {year: 1994, return: -0.18}, {year: 1995, return: 14.53},
        {year: 1996, return: 28.35}, {year: 1997, return: 14.98}, {year: 1998, return: -1.58}, {year: 1999, return: 31.59},
        {year: 2000, return: 7.41}, {year: 2001, return: -12.60}, {year: 2002, return: -12.40}, {year: 2003, return: 26.70},
        {year: 2004, return: 14.50}, {year: 2005, return: 23.29}, {year: 2006, return: 17.30}, {year: 2007, return: 9.80},
        {year: 2008, return: -33.00}, {year: 2009, return: 34.35}, {year: 2010, return: 17.27}, {year: 2011, return: -8.57},
        {year: 2012, return: 5.41}, {year: 2013, return: 9.55}, {year: 2014, return: 7.42}, {year: 2015, return: -8.32},
        {year: 2016, return: 21.08}, {year: 2017, return: 9.10}, {year: 2018, return: -8.88}, {year: 2019, return: 22.88},
        {year: 2020, return: 1.78}, {year: 2021, return: 20.64}, {year: 2022, return: -9.44}
    ];

    const binEdges = [-35, -30, -25, -20, -15, -10, -5, 0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60];

    function computeMaxBinCount() {
        const counts = new Array(binEdges.length - 1).fill(0);
        returnsData.forEach(point => {
            const idx = getBinIndex(point.return);
            counts[idx] += 1;
        });
        return Math.max(...counts);
    }

    const maxObservedCount = computeMaxBinCount();
    const maxCount = maxObservedCount + 1; // add a little headroom above the tallest bar
    const chartHeight = 400;
    const blockHeight = chartHeight / maxCount; // Total height divided by max Y

    let currentIndex = 0;
    let playInterval = null;

    // Initialize Chart
    function initChart() {
        const chart = document.getElementById('chart');
        const yAxisLabels = document.getElementById('y-axis-labels');
        
        // Setup Y-axis
        for(let i = 0; i <= maxCount; i++) {
            let label = document.createElement('div');
            label.innerText = i;
            label.style.height = blockHeight + 'px';
            label.style.display = 'flex';
            label.style.alignItems = 'flex-end';
            yAxisLabels.appendChild(label);
        }

        // Setup X-axis and Columns
        for (let i = 0; i < binEdges.length - 1; i++) {
            let col = document.createElement('div');
            col.className = 'bin-column';
            col.id = 'bin-' + i;
            
            let label = document.createElement('div');
            label.className = 'x-axis-label';
            label.innerText = binEdges[i];
            col.appendChild(label);

            // Add final label for the last column
            if (i === binEdges.length - 2) {
                let endLabel = document.createElement('div');
                endLabel.className = 'x-axis-label';
                endLabel.innerText = binEdges[i+1];
                endLabel.style.left = '100%';
                col.appendChild(endLabel);
            }

            chart.appendChild(col);
        }
    }

    function getBinIndex(val) {
        for(let i = 0; i < binEdges.length - 1; i++) {
            if (val >= binEdges[i] && val < binEdges[i+1]) return i;
        }
        return binEdges.length - 2; // Catch all for highest
    }

    function addBlock(dataPoint) {
        const binIdx = getBinIndex(dataPoint.return);
        const col = document.getElementById('bin-' + binIdx);
        
        const block = document.createElement('div');
        block.className = 'data-block highlight';
        block.title = `Year: ${dataPoint.year}, Return: ${dataPoint.return}%`;
        
        col.appendChild(block);

        // Animate height
        setTimeout(() => {
            block.style.height = blockHeight + 'px';
        }, 10);

        // Remove highlight after a moment
        setTimeout(() => {
            block.classList.remove('highlight');
        }, 400);

        document.getElementById('status-text').innerHTML = `Processing Year: <strong>${dataPoint.year}</strong> | Return: <strong>${dataPoint.return}%</strong> falls into bin [${binEdges[binIdx]} to ${binEdges[binIdx+1]})`;
    }

    function step() {
        if (currentIndex < returnsData.length) {
            addBlock(returnsData[currentIndex]);
            currentIndex++;
        } else {
            document.getElementById('status-text').innerText = "All data processed. Final distribution complete.";
            clearInterval(playInterval);
            document.getElementById('btn-step').disabled = true;
            document.getElementById('btn-play').disabled = true;
            document.getElementById('btn-final').disabled = true;
        }
    }

    function playAll() {
        document.getElementById('btn-play').disabled = true;
        document.getElementById('btn-step').disabled = true;
        playInterval = setInterval(() => {
            step();
            if (currentIndex >= returnsData.length) clearInterval(playInterval);
        }, 150); // Speed of animation
    }

    function showFinal() {
        clearInterval(playInterval);
        while (currentIndex < returnsData.length) {
            const binIdx = getBinIndex(returnsData[currentIndex].return);
            const col = document.getElementById('bin-' + binIdx);
            const block = document.createElement('div');
            block.className = 'data-block';
            block.style.height = blockHeight + 'px';
            block.title = `Year: ${returnsData[currentIndex].year}, Return: ${returnsData[currentIndex].return}%`;
            col.appendChild(block);
            currentIndex++;
        }
        document.getElementById('status-text').innerText = "All data processed. Final distribution complete.";
        document.getElementById('btn-step').disabled = true;
        document.getElementById('btn-play').disabled = true;
        document.getElementById('btn-final').disabled = true;
    }

    function reset() {
        clearInterval(playInterval);
        currentIndex = 0;
        document.getElementById('status-text').innerText = "Click 'Step Forward' to begin.";
        document.getElementById('btn-step').disabled = false;
        document.getElementById('btn-play').disabled = false;
        document.getElementById('btn-final').disabled = false;

        // Clear all blocks
        for (let i = 0; i < binEdges.length - 1; i++) {
            const col = document.getElementById('bin-' + i);
            const blocks = col.querySelectorAll('.data-block');
            blocks.forEach(b => b.remove());
        }
    }

    // Run initialization
    initChart();
</script>

</body>
</html>
